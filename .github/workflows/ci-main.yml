name: ci-main

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: write

env:
  PROJECT:        ${{ vars.PROJECT }}
  AWS_REGION:     ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPO_NAME:  "pps-htsh-poc-ecr"
  GH_ENV:         dev

jobs:
  scan:
    name: Code scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE}}

      - name: Checkov 
        uses: bridgecrewio/checkov-action@v12
        with:
          output_format: cli,sarif
          output_file_path: console,results.sarif
          quiet: true
          soft_fail: true

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true
          
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.2.0
        with:
          versionSpec: '6.4.x'

      - name: Determine Version
        id: version_step
        uses: gittools/actions/gitversion/execute@v4.2.0

      - run: |
          echo "majorMinorPatch (env.majorMinorPatch) : ${{ env.majorMinorPatch }}"
        name: Display GitVersion

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/nhse-pps-htsh-poc-gh-oidc
          role-session-name: gha-ci-main

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tags
        id: meta
        run: |
          ECR="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE="${ECR}/${{ env.ECR_REPO_NAME }}"
          echo "image=${IMAGE}"                 >> "$GITHUB_OUTPUT"
          echo "tag_sha=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_latest=${IMAGE}:latest"     >> "$GITHUB_OUTPUT"
          echo "majorMinorPatch=${IMAGE}:v${{ env.majorMinorPatch }}" >> "$GITHUB_OUTPUT"

      - name: Build image
        working-directory: django_app
        run: |
          docker build \
            --target dev \
            -t "${{ steps.meta.outputs.tag_sha }}" \
            -t "${{ steps.meta.outputs.tag_latest }}" \
            -t "${{ steps.meta.outputs.majorMinorPatch }}" \
            .

      - name: Test with coverage
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=config.settings.test \
            "${{ steps.meta.outputs.tag_sha }}" \
            sh -c "coverage run manage.py test"

      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.tag_sha }}"
          docker push "${{ steps.meta.outputs.tag_latest }}"
          docker push "${{ steps.meta.outputs.majorMinorPatch }}"

      - name: Push Git tag
        env:
          VERSION: ${{ steps.version_step.outputs.majorMinorPatch }}
        run: |
          TAG="v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping."
            exit 0
          fi

          git tag -a "${TAG}" "${GITHUB_SHA}" -m "Release ${TAG}"
          git push origin "${TAG}"