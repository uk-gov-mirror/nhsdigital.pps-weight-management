name: Deploy App Layer - Dev

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
        default: latest
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      environment_suffix:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - poc
          - dev
          - sandbox
          - demo
        default: poc
      include_app_vars:
        required: false
        type: boolean
        default: true
      dry_run:
        description: 'Perform a dry run (destroy only)'
        required: false
        type: boolean
        default: true

  schedule:
    # Destroy at 18:00 UTC (weekdays)
    - cron: '0 18 * * 1-5'
    # Apply at 08:00 UTC (weekdays)
    - cron: '0 8 * * 1-5'

env:
  PROJECT:           ${{ vars.PROJECT }}
  AWS_REGION:        ${{ vars.AWS_REGION }}
  GH_ENV:            dev
  INCLUDE_APP_VARS:   ${{ inputs.include_app_vars }}

jobs:
  plan-app-dev:
    uses: ./.github/workflows/terraform-plan.yml
    with:
      environment: dev
      environment_suffix: ${{ inputs.environment_suffix }}
      layer: app
      working_directory: infra/terraform/environments/dev/app
      image_tag: ${{ inputs.image_tag }}
      aws_region: ${{ vars.AWS_REGION }}
      aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      project: nhse-pps-htsh
      gh_env: dev
      include_app_vars: ${{ inputs.include_app_vars }}

  scheduled-destroy:
    if: github.event_name == 'schedule' && github.event.schedule == '0 18 * * 1-5'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment_suffix: [poc]
    steps:
      - name: Trigger destroy for ${{ matrix.environment_suffix }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd-dev-app.yml',
              ref: context.ref,
              inputs: {
                image_tag: 'latest',
                action: 'destroy',
                environment_suffix: '${{ matrix.environment_suffix }}',
                include_app_vars: 'true',
                dry_run: 'false'
              }
            })

  scheduled-apply:
    if: github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1-5'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment_suffix: [poc]
    steps:
      - name: Trigger apply for ${{ matrix.environment_suffix }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd-dev-app.yml',
              ref: context.ref,
              inputs: {
                image_tag: 'latest',
                action: 'apply',
                environment_suffix: '${{ matrix.environment_suffix }}',
                include_app_vars: 'true'
              }
            })

  apply-app-dev:
    if: inputs.action == 'apply'
    needs: plan-app-dev
    uses: ./.github/workflows/terraform-apply.yml
    with:
      environment: dev
      environment_suffix: ${{ inputs.environment_suffix }}
      layer: app
      working_directory: infra/terraform/environments/dev/app
      aws_region: ${{ vars.AWS_REGION }}
      aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      project: nhse-pps-htsh
      gh_env: dev
      include_app_vars: ${{ inputs.include_app_vars }}

  destroy-app-dev:
    if: inputs.action == 'destroy'
    needs: plan-app-dev
    uses: ./.github/workflows/terraform-destroy.yml
    with:
      environment: dev
      environment_suffix: ${{ inputs.environment_suffix }}
      layer: app
      working_directory: infra/terraform/environments/dev/app
      aws_region: ${{ vars.AWS_REGION }}
      aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      project: nhse-pps-htsh
      gh_env: dev
      include_app_vars: ${{ inputs.include_app_vars }}
      dry_run: ${{ inputs.dry_run }}