name: Destroy Ephemeral Infra

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}-lock
  cancel-in-progress: false  

on:
  pull_request:
    types: [closed]
    branches: [ main ]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  destroy:
    runs-on: ubuntu-latest

    name: Destroy pr-${{ github.event.number }}
    
    concurrency:
      group: destroy-pr-${{ github.event.number }}
      cancel-in-progress: false

    environment: poc

    env:
      PROJECT:           ${{ vars.PROJECT }}
      AWS_REGION:        ${{ vars.AWS_REGION }}
      DEPLOY_ENV:        pr-${{ github.event.number }}
      GH_ENV:            poc
      TF_STATE_BUCKET:   ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_LOCK:     ${{ vars.TF_STATE_LOCK_TABLE }}
  
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS creds (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT }}-${{ env.GH_ENV }}-gh-oidc
          role-session-name: gha-destroy-${{ env.DEPLOY_ENV }}

      - id: state
        name: Check if TF state exists
        run: |
          if aws s3api head-object \
               --bucket "${TF_STATE_BUCKET}" \
               --key "${DEPLOY_ENV}/terraform.tfstate" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform init 
        if: ${{ steps.state.outputs.exists == 'true' }}
        working-directory: infra/terraform
        run: |
          terraform init \
            -reconfigure \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ env.TF_STATE_LOCK }}" \
            -backend-config="key=${{ env.DEPLOY_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Show current state (non-fatal if new/missing)
        if: ${{ steps.state.outputs.exists == 'true' }}
        working-directory: infra/terraform
        run: terraform state list || true

      - name: Terraform destroy (ephemeral env)
        if: ${{ steps.state.outputs.exists == 'true' }}
        working-directory: infra/terraform
        env:
          TF_VAR_region:   ${{ env.AWS_REGION }}
          TF_VAR_project:  ${{ env.PROJECT }}
          TF_VAR_env:      ${{ env.DEPLOY_ENV }}
          TF_VAR_gh_owner: ${{ github.repository_owner }}
          TF_VAR_gh_repo:  ${{ github.event.repository.name }}
          TF_INPUT:       0
        # Lock to avoid any race with a still-running apply; be generous with timeout
        run: terraform destroy -auto-approve -lock-timeout=15m

      - name: Remove remote state (bucket)
        if: ${{ success() && startsWith(env.DEPLOY_ENV, 'pr-') }}
        env:
          BUCKET: ${{ env.TF_STATE_BUCKET }}
          KEY:    ${{ env.DEPLOY_ENV }}/terraform.tfstate
        run: |
          set -euo pipefail
          echo "Cleaning remote state s3://$BUCKET/$KEY"
      
          # Loop to delete all versions of the object, including delete markers
          while true; do
            VERSIONS=$(aws s3api list-object-versions \
              --bucket "$BUCKET" \
              --prefix "$KEY" \
              --query 'Versions[?VersionId != `null`].{Key: Key,VersionId: VersionId}[]' \
              --output json)
      
            DELETEMARKERS=$(aws s3api list-object-versions \
              --bucket "$BUCKET" \
              --prefix "$KEY" \
              --query 'DeleteMarkers[].{Key: Key,VersionId: VersionId}[]' \
              --output json)

            ALL_OBJECTS=$(echo "${VERSIONS} ${DELETEMARKERS}" | jq -s 'add')
      
            if [ "$(echo "$ALL_OBJECTS" | jq 'length')" -eq 0 ]; then
              echo "No more versions or delete markers found. Deletion complete."
              break
            fi
      
            echo "$ALL_OBJECTS" | jq -s '{Objects: add, Quiet: true}' > /tmp/del-vers.json
      
            aws s3api delete-objects --bucket "$BUCKET" --delete file:///tmp/del-vers.json
      
          done

      - name: Comment that preview env was destroyed
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Preview environment \`${process.env.DEPLOY_ENV}\` has been destroyed.`
            });

      - name: Nothing to destroy
        if: ${{ steps.state.outputs.exists != 'true' }}
        run: echo "No state found for ${DEPLOY_ENV}; skipping destroy."
          
