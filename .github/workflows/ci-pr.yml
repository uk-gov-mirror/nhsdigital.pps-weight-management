name: ci-pr

on:
  pull_request:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

env:
  PROJECT:        ${{ vars.PROJECT }}
  AWS_REGION:     ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPO_NAME:  "pps-htsh-poc-ecr"
  GH_ENV:         dev

jobs:
  build-test-push:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/nhse-pps-htsh-poc-gh-oidc
          role-session-name: gha-ci-pr

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tags
        id: meta
        run: |
          ECR="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE="${ECR}/${{ env.ECR_REPO_NAME }}"
          TAG="pr-${{ github.event.pull_request.number }}-${{ github.sha }}"
          echo "image=${IMAGE}"        >> "$GITHUB_OUTPUT"
          echo "tag_pr=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build image
        working-directory: django_app
        run: |
          docker build \
            --target dev \
            -t "${{ steps.meta.outputs.tag_pr }}" \
            .

      - name: Test image
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=wm_django.settings.dev \
            -e DJANGO_ENV=dev \
            "${{ steps.meta.outputs.tag_pr }}" \
            python3 manage.py test

      - name: Push image
        run: docker push "${{ steps.meta.outputs.tag_pr }}"