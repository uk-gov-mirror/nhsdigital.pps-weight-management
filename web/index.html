<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>PPS Weight Management</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 2rem; }
    button { padding: .6rem 1rem; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; }
    pre { background: #f6f8fa; padding: 1rem; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>!Hello World!</h1>

  <button onclick="ping()">Public Ping</button>
  <pre id="out">Click the button to ping /public/api/ping</pre>

 <script>
    async function ping() {
      try {
        const res = await fetch('/public/api/ping');
        const text = await res.text();
        document.getElementById('out').textContent = text;
      } catch (e) {
        document.getElementById('out').textContent = 'Error: ' + e;
      }
    }
  </script>
</body>
</html>
