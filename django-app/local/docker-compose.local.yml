services:
  db:
    image: postgres:16
    profiles: ["dev"]               
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    image: ppswm:local
    profiles: ["dev","default"]     # runs by default; also when using --profile dev
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: helloworld.settings.dev
      DATABASE_URL: postgres://app:app@db:5432/app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
